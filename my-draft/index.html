<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>novr.one:~$</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>body {font-family: 'Share Tech Mono' !important}</style>
  </head>
  <body class="bg-dark">
    <div class="container p-5">
      <h3 class="text-success"><strong>root</strong>@<strong>novr.one</strong>:~# cd ~<span id="pathprint"></span></h3>
      <div id="contents"></div>
    </div>
    <script>
      (async () => {
        const github_user = 'xchopath';
        const github_repo = 'www.novr.one';
        const response = await fetch('https://api.github.com/repos/' + github_user + '/' + github_repo + '/contents' + window.location.pathname);
        const data = await response.json();
        let contentsHtml = '<ul class="list-group list-group-flush bg-transparent">';
        for (let row of data) {
          if ((/.md$/).test(row.name)) {
            const linkName = row.name.replace('.md', '')
            const linkFile = row.path.replace('.md', '')
            contentsHtml += `<li class="list-group-item bg-transparent border-success"><a href="/${linkFile}" class="text-decoration-none text-light">${linkName}</a></li>`;
          }
        }
        contentsHtml += '</ul>';
        document.getElementById('contents').innerHTML = contentsHtml;
        document.getElementById('pathprint').innerHTML = window.location.pathname;
      })()
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
