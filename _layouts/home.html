---
layout: default
home: true
---

<h3 class="posts-item-note" aria-label="Recent Posts">Recent Posts</h3>

{% for post in paginator.posts %}
  <article class="post-item">
    <span class="post-item-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <h4 class="post-item-title">
      <a href="{{ post.url }}">{{ post.title | escape }}</a>
    </h4>
  </article>
{% endfor %}

<!-- Pagination links -->
<center>
  <article class="post-item">
    {% if paginator.previous_page %}
      <h4 class="post-item-title"><a href="{{ paginator.previous_page_path }}">[ Previous ]</a></h4>
    {% endif %}
    {% if paginator.next_page %}
      <h4 class="post-item-title"><a href="{{ paginator.next_page_path }}">[ Next ]</a></h4>
    {% endif %}
  </article>
</center>
