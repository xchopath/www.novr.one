<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasi Vektor</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mt-3">Operasi Vektor:</h2>
        <pre>UTS Aljabar Linear by Novran Faathir (220401010230)</pre>
        <form id="vectorForm" class="mt-4">
            <div class="form-group">
                <label for="vektorU">U:</label>
                <input type="text" class="form-control" id="vektorU" placeholder="Masukkan Vektor U (contoh: -2,3,0)" value="-2,3,0" required>
            </div>

            <div class="form-group">
                <label for="vektorV">V:</label>
                <input type="text" class="form-control" id="vektorV" placeholder="Masukkan Vektor V (contoh: 3,-5,2)" value="3,-5,2" required>
            </div>

            <div class="text-center">
                <button type="button" class="btn btn-danger mr-2" onclick="penjumlahanVektor()">Penjumlahan</button>
                <button type="button" class="btn btn-danger mr-2" onclick="penguranganVektor()">Pengurangan</button>
                <button type="button" class="btn btn-danger mr-2" onclick="dotProduct()">Dot Product</button>
                <button type="button" class="btn btn-danger mr-2" onclick="perkalianSkalar()">Perkalian</button>
                <button type="button" class="btn btn-danger" onclick="transformElementer()">Transformasi Elementer</button>
            </div>

            <h3 class="mt-4">Hasil:</h3>
            <div id="hasil" class="border border-secondary rounded p-3 bg-transparent text-dark"></div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <script>
        function parseVector(str) {
            return str.split(',').map(Number);
        }
        function penjumlahanVektor() {
            const vektorU = parseVector(document.getElementById('vektorU').value);
            const vektorV = parseVector(document.getElementById('vektorV').value);
            const hasil = vektorU.map((u, i) => u + vektorV[i]);
            document.getElementById('hasil').innerText = `${hasil}`;
        }
        function penguranganVektor() {
            const vektorU = parseVector(document.getElementById('vektorU').value);
            const vektorV = parseVector(document.getElementById('vektorV').value);
            const hasil = vektorU.map((u, i) => u - vektorV[i]);
            document.getElementById('hasil').innerText = `${hasil}`;
        }
        function dotProduct() {
            const vektorU = parseVector(document.getElementById('vektorU').value);
            const vektorV = parseVector(document.getElementById('vektorV').value);
            const hasil = vektorU.reduce((acc, u, i) => acc + u * vektorV[i], 0);
            document.getElementById('hasil').innerText = `${hasil}`;
        }
        function perkalianSkalar() {
            const vektorU = parseVector(document.getElementById('vektorU').value);
            const scalar = parseFloat(prompt('Skalar:'));
            const hasil = vektorU.map(u => u * scalar);
            document.getElementById('hasil').innerText = `${hasil}`;
        }
        function transformElementer() {
            const vektorU = parseVector(document.getElementById('vektorU').value);
            const hasil = [2 * vektorU[0], 3 * vektorU[1]];
            document.getElementById('hasil').innerText = `${hasil}`;
        }
    </script>
</body>
</html>
